<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Overload Protocol</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #000;
            overflow: hidden;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Courier New', monospace;
        }
        
        #game {
            display: block;
            width: 100%;
            height: 100vh;
            max-width: 100%;
            max-height: 100%;
        }
    </style>
</head>
<body>
    <div id="game"></div>

    <!-- Phaser -->
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.85.2/dist/phaser.min.js"></script>



    <!-- Core системы -->
    <script src="js/core/Player.js"></script>
    <script src="js/core/LidarSystem.js"></script>
    <script src="js/core/MemorySystem.js"></script>
    <script src="js/core/AttentionSystem.js"></script>
    <script src="js/core/InputManager.js"></script>
    <script src="js/managers/LevelManager.js"></script>
    <script src="js/managers/MiniGameManager.js"></script>

    <!-- Мини игры -->
    <script src="js/minigames/TypingGame.js"></script>
    <script src="js/minigames/FindPassword.js"></script>
    <script src="js/minigames/FlappyBird.js"></script>
    <script src="js/minigames/BulletHell.js"></script>


    <script src="js/managers/TestMode.js"></script>

    <!-- Мир -->
    <script src="js/world/WallManager.js"></script>
    <script src="js/world/item.js"></script>
    <script src="js/world/TransitionZone.js"></script>
    <script src="js/world/Device.js"></script>

    <!-- Сцены -->
    <script src="js/scenes/EchoScene.js"></script>
    <script src="js/scenes/UIScene.js"></script>
    <script src="js/scenes/TerminalScene.js"></script>
    <script src="js/scenes/PasswordGameScene.js"></script>
    
    <!-- UI компоненты. -->
    <script src="js/ui/CommandLine.js"></script>
    <script src="js/ui/InterfaceElements.js"></script>
    
    <!-- Менеджеры -->
    <script src="js/managers/MusicManager.js"></script>

<script>document.body.addEventListener('click', () => {
    const musicManager = window.game?.registry?.get('musicManager');
    if (musicManager && !musicManager.isInitialized) {
        musicManager.init();
    }
}, { once: true });

document.body.addEventListener('keydown', () => {
    const musicManager = window.game?.registry?.get('musicManager');
    if (musicManager && !musicManager.isInitialized) {
        musicManager.init();
    }
}, { once: true });</script>
    
    <!-- Эффекты -->
    <script src="js/effects/GlitchPipeLine.js"></script>
    <script src="js/effects/SimpleGlitchEffect.js"></script>
    
    <!-- Утилиты -->
    <script src="js/utils/helpers.js"></script>
    
    <!-- Главный файл -->
    <script src="js/main.js"></script>
</body>
</html>
